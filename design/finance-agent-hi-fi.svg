      <rect x="14" y="14" width="318" height="732" rx="34" fill="url(#deviceScreen)"/>
      <rect x="123" y="10" width="100" height="10" rx="5" fill="#0B1715"/>
    </g>

    <text x="28" y="50" class="phoneLabel">Me</text>
    <text x="28" y="76" class="small">Assets, preferences and the annual planning entry.</text>

    <rect x="28" y="100" width="290" height="136" rx="30" fill="url(#heroCard)"/>
    <circle cx="72" cy="145" r="24" fill="rgba(255,255,255,0.18)"/>
    <text x="108" y="142" class="tiny" fill="#CFE7E3">PROFILE</text>
    <text x="108" y="174" class="metricDark">Ellaxin</text>
    <text x="108" y="202" class="heroText">偏好：平衡建议 · 重点：储蓄与现金流</text>

    <rect x="28" y="258" width="138" height="108" rx="24" fill="url(#mintCard)"/>
    <rect x="180" y="258" width="138" height="108" rx="24" fill="url(#blueCard)"/>
    <text x="48" y="290" class="tiny">ASSETS</text>
    <text x="48" y="326" class="metricL">¥128k</text>
    <text x="48" y="350" class="small">现金 + 存款 + 投资</text>
    <text x="200" y="290" class="tiny">LIABILITIES</text>
    <text x="200" y="326" class="metricL">¥6.8k</text>
    <text x="200" y="350" class="small">信用卡与短期欠款</text>

    <rect x="28" y="388" width="290" height="76" rx="24" fill="#FFFFFF" stroke="#DCE5E2"/>
    <text x="50" y="420" class="section">年度财务规划</text>
    <text x="50" y="446" class="small">收入、预算、目标、偏好与大额支出计划</text>
    <text x="290" y="428" class="body">›</text>

    <rect x="28" y="478" width="290" height="76" rx="24" fill="#FFFFFF" stroke="#DCE5E2"/>
    <text x="50" y="510" class="section">资产信息</text>
    <text x="50" y="536" class="small">现金、存款、基金 / 股票、信用卡待还</text>
    <text x="290" y="518" class="body">›</text>

    <rect x="28" y="568" width="290" height="76" rx="24" fill="#FFFFFF" stroke="#DCE5E2"/>
