    <text x="154" y="596" class="chipText">全年预测</text>
    <text x="256" y="596" class="chipText">目标差距</text>

    <rect x="28" y="630" width="290" height="52" rx="26" fill="#FFFFFF" stroke="#DCE5E1"/>
    <text x="52" y="662" class="body">问点什么，比如“我今年会不会超支？”</text>
