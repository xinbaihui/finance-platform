    <text x="290" y="608" class="body">›</text>

    <rect x="48" y="701" width="250" height="1" fill="#E0E9E5"/>
    <text x="38" y="728" class="navText">Chat</text>
    <text x="144" y="728" class="navText">Analysis</text>
    <rect x="252" y="710" width="44" height="4" rx="2" fill="#183B35"/>
    <text x="262" y="728" class="navTextActive">Me</text>
  </g>

  <g transform="translate(1318 246)">
    <g filter="url(#softShadow)">
      <rect x="0" y="0" width="346" height="760" rx="42" fill="url(#deviceFrame)"/>
      <rect x="14" y="14" width="318" height="732" rx="34" fill="url(#deviceScreen)"/>
      <rect x="123" y="10" width="100" height="10" rx="5" fill="#0B1715"/>
    </g>

    <text x="28" y="50" class="phoneLabel">Annual Plan</text>
    <text x="28" y="76" class="small">The key data intake that powers analysis and agent memory.</text>

    <rect x="28" y="100" width="138" height="104" rx="22" fill="#FFFFFF" stroke="#DCE5E2"/>
    <rect x="180" y="100" width="138" height="104" rx="22" fill="#FFFFFF" stroke="#DCE5E2"/>
    <text x="46" y="132" class="tiny">MONTHLY INCOME</text>
    <text x="46" y="168" class="metricL">¥18,000</text>
    <text x="198" y="132" class="tiny">FIXED COST</text>
    <text x="198" y="168" class="metricL">¥5,300</text>

    <rect x="28" y="222" width="290" height="112" rx="24" fill="url(#mintCard)"/>
    <text x="50" y="256" class="tiny">ANNUAL SAVING TARGET</text>
    <text x="50" y="292" class="metricL">¥60,000</text>
    <rect x="50" y="304" width="218" height="10" rx="5" fill="#CFE1DA"/>
    <rect x="50" y="304" width="76" height="10" rx="5" fill="#0F766E"/>
    <text x="278" y="313" class="small">31%</text>

    <rect x="28" y="352" width="290" height="86" rx="24" fill="#FFFFFF" stroke="#DCE5E2"/>
    <text x="50" y="384" class="section">大额支出计划</text>
    <text x="50" y="412" class="small">9 月旅行 ¥8,000 · 11 月换电脑 ¥10,000</text>

    <rect x="28" y="454" width="290" height="106" rx="24" fill="#FFFFFF" stroke="#DCE5E2"/>
    <text x="50" y="486" class="section">建议风格</text>
    <rect x="50" y="504" width="76" height="30" rx="15" fill="#183B35"/>
    <rect x="136" y="504" width="76" height="30" rx="15" fill="#E7ECE9"/>
    <rect x="222" y="504" width="76" height="30" rx="15" fill="#E7ECE9"/>
    <text x="75" y="524" class="whiteChipText">平衡</text>
    <text x="161" y="524" class="chipText">保守</text>
    <text x="239" y="524" class="chipText">品质</text>
    <text x="50" y="548" class="small">让 Agent 给建议时更贴近你的生活方式。</text>

    <rect x="28" y="580" width="290" height="70" rx="24" fill="url(#actionBtn)"/>
    <text x="90" y="623" class="whiteChipText" style="font-size:18px;">保存并更新 Agent 记忆</text>

    <rect x="48" y="701" width="250" height="1" fill="#E0E9E5"/>
    <text x="38" y="728" class="navText">Chat</text>
    <text x="144" y="728" class="navText">Analysis</text>
    <text x="262" y="728" class="navTextActive">Plan</text>
