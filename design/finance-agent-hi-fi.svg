  <text x="118" y="128" class="displayTitle">Finance Agent App Visual Mockups</text>
  <text x="118" y="170" class="displaySub">把你前面的产品结构推进成更像真实作品集的展示稿，适合面试时讲功能、数据闭环和 Agent 价值。</text>

