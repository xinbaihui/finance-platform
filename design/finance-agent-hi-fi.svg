    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#D9E5FF"/>
    </linearGradient>
    <linearGradient id="actionBtn" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#163831" flood-opacity="0.14"/>
    </filter>
    <filter id="innerCardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1A4038" flood-opacity="0.08"/>
    </filter>
    <style>
      .displayTitle { font: 700 54px Georgia, 'Times New Roman', serif; fill: #19352F; }
      .displaySub { font: 400 22px Arial, sans-serif; fill: #506A62; }
      .phoneLabel { font: 700 26px Georgia, 'Times New Roman', serif; fill: #173A34; }
      .section { font: 700 18px Arial, sans-serif; fill: #1F433D; letter-spacing: 0.02em; }
      .body { font: 400 17px Arial, sans-serif; fill: #567068; }
      .small { font: 400 14px Arial, sans-serif; fill: #7A918B; }
      .tiny { font: 700 12px Arial, sans-serif; fill: #6D847E; letter-spacing: 0.08em; }
      .metricXL { font: 700 34px Georgia, 'Times New Roman', serif; fill: #143731; }
      .metricL { font: 700 28px Georgia, 'Times New Roman', serif; fill: #143731; }
      .metricDark { font: 700 36px Georgia, 'Times New Roman', serif; fill: #FFFFFF; }
      .heroText { font: 400 17px Arial, sans-serif; fill: rgba(255,255,255,0.82); }
      .navText { font: 700 14px Arial, sans-serif; fill: #809792; }
      .navTextActive { font: 700 14px Arial, sans-serif; fill: #163B35; }
      .chipText { font: 700 13px Arial, sans-serif; fill: #163B35; }
      .whiteChipText { font: 700 13px Arial, sans-serif; fill: #FFFFFF; }
