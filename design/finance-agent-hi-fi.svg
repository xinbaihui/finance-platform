<svg width="1800" height="2080" viewBox="0 0 1800 2080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="canvas" x1="164" y1="32" x2="1574" y2="2046" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F0E8"/>
      <stop offset="0.5" stop-color="#ECF4EA"/>
      <stop offset="1" stop-color="#E4EEF4"/>
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(315 430) rotate(74.8) scale(421 365)">
      <stop stop-color="#A9E5CF"/>
      <stop offset="1" stop-color="#A9E5CF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1440 340) rotate(120) scale(330 285)">
      <stop stop-color="#B8C8FF"/>
      <stop offset="1" stop-color="#B8C8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="deviceFrame" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17332E"/>
      <stop offset="1" stop-color="#0D1D1A"/>
    </linearGradient>
    <linearGradient id="deviceScreen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FBFCF8"/>
      <stop offset="1" stop-color="#F2F5F1"/>
    </linearGradient>
    <linearGradient id="heroCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#123D37"/>
      <stop offset="0.55" stop-color="#1D5B52"/>
      <stop offset="1" stop-color="#4467B8"/>
    </linearGradient>
    <linearGradient id="mintCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8F7F0"/>
      <stop offset="1" stop-color="#DDEFEA"/>
