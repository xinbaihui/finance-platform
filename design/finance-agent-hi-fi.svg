    <circle cx="280" cy="150" r="22" fill="rgba(255,255,255,0.15)"/>

    <rect x="100" y="274" width="218" height="88" rx="24" fill="#FFFFFF" filter="url(#innerCardShadow)"/>
    <text x="122" y="312" class="body">如果我把每月餐饮降 500，年底还能补回多少？</text>
    <text x="122" y="340" class="small">User</text>

    <rect x="28" y="382" width="290" height="170" rx="26" fill="#F7FAF8" stroke="#DFE8E4"/>
    <text x="52" y="420" class="section">Agent insight</text>
    <text x="52" y="454" class="body">预计全年可多存 ¥4,500 到 ¥6,000。</text>
    <text x="52" y="484" class="body">高频餐饮是你最容易回收现金流的支出项，</text>
    <text x="52" y="514" class="body">建议先将预算从 2,800 调整到 2,300，保留</text>
    <text x="52" y="544" class="body">每周一次弹性额度，避免计划失真。</text>

