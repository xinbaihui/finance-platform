  <g transform="translate(118 1116)">
    <rect x="0" y="0" width="1546" height="792" rx="42" fill="rgba(255,255,255,0.56)" stroke="rgba(255,255,255,0.6)"/>
    <text x="48" y="66" class="phoneLabel">Presentation Notes</text>
    <text x="48" y="104" class="body">这一版更偏“作品集展示稿”，适合你在面试里讲清楚：理财 Agent 不是问答壳，而是围绕长期规划、年度分析和可执行建议构建的决策辅助系统。</text>

    <rect x="48" y="148" width="470" height="250" rx="30" fill="#FFFFFF" filter="url(#innerCardShadow)"/>
    <text x="80" y="194" class="section">Why this feels productized</text>
    <text x="80" y="236" class="body">1. 底部三大 Tab 承担不同任务：聊天、分析、个人配置。</text>
    <text x="80" y="274" class="body">2. 年度规划单独成入口，解决 AI 产品最常见的数据不完整问题。</text>
    <text x="80" y="312" class="body">3. 分析页不仅展示图表，还给出全年 projection 与目标差距。</text>
    <text x="80" y="350" class="body">4. 聊天页基于财务上下文回答，而不是泛化建议。</text>

    <rect x="538" y="148" width="470" height="250" rx="30" fill="#FFFFFF" filter="url(#innerCardShadow)"/>
    <text x="570" y="194" class="section">What to build first</text>
    <text x="570" y="236" class="body">1. 先做年度规划数据结构与表单。</text>
    <text x="570" y="274" class="body">2. 再做财务分析页：支出结构、储蓄进度、全年预测。</text>
    <text x="570" y="312" class="body">3. 最后接入 Chat，让它读取同一份 profile 与分析结果。</text>

    <rect x="1028" y="148" width="470" height="250" rx="30" fill="#FFFFFF" filter="url(#innerCardShadow)"/>
    <text x="1060" y="194" class="section">Good interview story</text>
    <text x="1060" y="236" class="body">“我不是做了个记账 UI，而是做了一个有长期基线、</text>
    <text x="1060" y="274" class="body">能解释年度风险、还能把建议收敛成动作的理财 Agent。”</text>
    <text x="1060" y="330" class="body">这句会很有力量。</text>

    <rect x="48" y="438" width="1450" height="292" rx="30" fill="url(#heroCard)"/>
    <text x="88" y="498" class="tiny" fill="#CFE7E3">NEXT STEP</text>
    <text x="88" y="556" style="font:700 38px Georgia, 'Times New Roman', serif; fill:#FFFFFF;">可以继续把它推进成真正能点的前端页面</text>
    <text x="88" y="600" class="heroText">如果你愿意，下一步最值得做的是直接实现 `财务分析页`。这页最能体现你的前端能力、图表组织能力，以及 Agent 数据闭环设计。</text>
    <rect x="88" y="636" width="206" height="38" rx="19" fill="rgba(255,255,255,0.16)"/>
    <text x="132" y="661" class="whiteChipText">Build Analysis Screen</text>
  </g>
</svg>
