<svg width="1500" height="1100" viewBox="0 0 1500 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1500" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8F2"/>
      <stop offset="1" stop-color="#E6EFE8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#183E36" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #133A33; }
      .sub { font: 400 21px Arial, sans-serif; fill: #527067; }
      .h { font: 700 24px Arial, sans-serif; fill: #183D35; }
      .b { font: 400 18px Arial, sans-serif; fill: #4E6961; }
      .m { font: 700 30px Arial, sans-serif; fill: #133A33; }
      .s { font: 400 15px Arial, sans-serif; fill: #738B84; }
    </style>
  </defs>

  <rect width="1500" height="1100" fill="url(#bg2)"/>
  <text x="74" y="96" class="title">Analysis + Planning Detail</text>
  <text x="74" y="132" class="sub">更接近真实产品的信息层级，方便你后续做高保真设计或直接开工。</text>

  <g transform="translate(74 190)" filter="url(#shadow2)">
    <rect width="848" height="790" rx="36" fill="#FFFFFF"/>
    <text x="40" y="56" class="h">财务分析页信息层级</text>

    <rect x="40" y="88" width="120" height="42" rx="21" fill="#163B35"/>
    <rect x="170" y="88" width="120" height="42" rx="21" fill="#E8EEEA"/>
    <rect x="654" y="88" width="154" height="42" rx="21" fill="#F8FAF9" stroke="#D7E4DD"/>
    <text x="79" y="115" class="b" fill="#FFFFFF">年度</text>
    <text x="209" y="115" class="b">月度</text>
    <text x="706" y="115" class="s">2026 年 ▼</text>

    <rect x="40" y="156" width="240" height="136" rx="24" fill="#F7FBF8" stroke="#DCE8E0"/>
    <rect x="304" y="156" width="240" height="136" rx="24" fill="#F7FBF8" stroke="#DCE8E0"/>
    <rect x="568" y="156" width="240" height="136" rx="24" fill="#F7FBF8" stroke="#DCE8E0"/>
    <text x="64" y="196" class="s">本年度总支出</text>
    <text x="64" y="242" class="m">¥32,400</text>
    <text x="64" y="270" class="s">较年度预算 +11%</text>
    <text x="328" y="196" class="s">本年度已储蓄</text>
    <text x="328" y="242" class="m">¥18,700</text>
    <text x="328" y="270" class="s">目标完成 31%</text>
    <text x="592" y="196" class="s">预计全年支出</text>
    <text x="592" y="242" class="m">¥97,200</text>
    <text x="592" y="270" class="s">预计超支 ¥9,200</text>

    <rect x="40" y="320" width="420" height="248" rx="28" fill="#FFFFFF" stroke="#DCE8E0"/>
    <text x="66" y="362" class="h">支出饼图</text>
    <circle cx="180" cy="454" r="88" fill="#D9EEE8"/>
    <path d="M180 454 L180 366 A88 88 0 0 1 261 495 Z" fill="#1D4ED8"/>
    <path d="M180 454 L261 495 A88 88 0 0 1 152 538 Z" fill="#F59E0B"/>
    <path d="M180 454 L152 538 A88 88 0 0 1 92 405 Z" fill="#10B981"/>
    <path d="M180 454 L92 405 A88 88 0 0 1 180 366 Z" fill="#EF4444"/>
    <rect x="302" y="398" width="18" height="18" rx="4" fill="#EF4444"/>
    <rect x="302" y="432" width="18" height="18" rx="4" fill="#1D4ED8"/>
    <rect x="302" y="466" width="18" height="18" rx="4" fill="#F59E0B"/>
    <rect x="302" y="500" width="18" height="18" rx="4" fill="#10B981"/>
    <text x="332" y="413" class="b">住房 38%</text>
    <text x="332" y="447" class="b">餐饮 24%</text>
    <text x="332" y="481" class="b">购物 18%</text>
    <text x="332" y="515" class="b">其他 20%</text>

    <rect x="484" y="320" width="324" height="248" rx="28" fill="#FFFFFF" stroke="#DCE8E0"/>
    <text x="510" y="362" class="h">关键结论</text>
    <text x="510" y="410" class="b">1. 住房稳定，但餐饮和购物是超支主因。</text>
    <text x="510" y="448" class="b">2. 按当前节奏，全年超支风险中等偏高。</text>
    <text x="510" y="486" class="b">3. 若控制高频可变支出，储蓄目标仍可追回。</text>
    <text x="510" y="532" class="s">适合用卡片 + 解释文案的组合呈现。</text>

    <rect x="40" y="594" width="768" height="154" rx="28" fill="#EAF5F2"/>
    <text x="66" y="636" class="h">AI 行动建议</text>
    <text x="66" y="678" class="b">将餐饮预算从 2,800 降至 2,300；购物支出从 1,600 降至 1,000；</text>
    <text x="66" y="708" class="b">每月固定转入储蓄 5,000，并预留 3,000 作为应急金缓冲。</text>
  </g>

  <g transform="translate(956 190)" filter="url(#shadow2)">
    <rect width="470" height="790" rx="36" fill="#FFFFFF"/>
    <text x="34" y="56" class="h">年度规划表单结构</text>

    <rect x="34" y="92" width="402" height="86" rx="22" fill="#F8FAF9" stroke="#DCE8E0"/>
    <text x="58" y="126" class="s">收入与固定支出</text>
    <text x="58" y="154" class="b">月收入、年终奖、房租 / 房贷、水电、订阅、待还款</text>

    <rect x="34" y="198" width="402" height="86" rx="22" fill="#F8FAF9" stroke="#DCE8E0"/>
    <text x="58" y="232" class="s">年度目标</text>
    <text x="58" y="260" class="b">年度储蓄目标、年度支出预算、应急金目标</text>

    <rect x="34" y="304" width="402" height="86" rx="22" fill="#F8FAF9" stroke="#DCE8E0"/>
    <text x="58" y="338" class="s">资产与负债</text>
    <text x="58" y="366" class="b">现金、存款、基金 / 股票、信用卡待还、其他负债</text>

    <rect x="34" y="410" width="402" height="86" rx="22" fill="#F8FAF9" stroke="#DCE8E0"/>
    <text x="58" y="444" class="s">偏好与策略</text>
    <text x="58" y="472" class="b">风险偏好、建议风格、关注重点、大额支出计划</text>

    <rect x="34" y="536" width="402" height="116" rx="24" fill="#163B35"/>
    <text x="58" y="580" style="font:700 22px Arial, sans-serif; fill:#FFFFFF;">为什么这个入口重要</text>
    <text x="58" y="616" class="b" fill="#D6EBE4">它是 Agent 的长期上下文来源，不需要用户在聊天里</text>
    <text x="58" y="644" class="b" fill="#D6EBE4">反复补全数据，也让分析页的预测更有依据。</text>

    <rect x="34" y="684" width="402" height="72" rx="24" fill="#0F766E"/>
    <text x="86" y="729" style="font:700 22px Arial, sans-serif; fill:#FFFFFF;">保存并更新我的全年基线</text>
  </g>
</svg>
